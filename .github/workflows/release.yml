name: release

# Tag-triggered release pipeline.
#
# On `git push origin vX.Y.Z`, this workflow runs the full smoke test
# (typecheck + LOC + vitest), verifies package.json matches the tag, then
# ships three artifacts IN THIS ORDER:
#   1. Publishes to npm — the PRIMARY artifact, published FIRST so a slow or
#      flaky multi-arch container build can never block it (v0.20.1 hung 30+
#      min on the arm64 QEMU build and gated the npm publish).
#   2. Creates a GitHub Release with the matching CHANGELOG.md section as body.
#   3. Builds + pushes a multi-arch (amd64+arm64) container to GHCR tagged
#      `:vX.Y.Z` and `:latest`.
#
# Steps 2 and 3 are BEST-EFFORT (continue-on-error): once npm has shipped, a
# transient failure in one must not abort the job and orphan the other. If one
# is missed (e.g. a GitHub API outage — v0.34.0 lost both when the Release step,
# then lacking continue-on-error, choked on an HTML 503), create it manually:
#   - Release:   gh release create vX.Y.Z --notes-file <this version's changelog>
#   - Container: docker buildx build --platform linux/amd64,linux/arm64 --push …
# Do NOT re-run the whole workflow to recover — the npm step is not
# skip-if-exists, so it aborts on the already-published version before it ever
# reaches the other two.
#
# Required repo secrets:
#   NPM_TOKEN — granular access token with "Bypass two-factor
#               authentication" enabled, scoped to skillscript-runtime
#               read-and-write (see feedback_npm_publish_2fa memory)
#
# GITHUB_TOKEN is auto-provided with the permissions block below.

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create GitHub Releases
      packages: write    # push to GHCR
      id-token: write    # npm provenance via OIDC
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fast fail signals first, then build, then full vitest. The dogfood
      # fixtures shell out to `node dist/cli.js`, so dist/ must exist before
      # vitest runs.
      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: LOC ceiling check
        run: pnpm run loc-check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm exec vitest run

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "FAIL: package.json version '$PKG_VERSION' does not match tag 'v$TAG_VERSION'"
            exit 1
          fi
          echo "OK: package.json and tag agree on v$TAG_VERSION"

      - name: Extract changelog section for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Escape regex dots so 0.2.4 matches literally, not as 0a2b4.
          ESCAPED="${VERSION//./\\.}"
          awk "/^## ${ESCAPED}([^0-9]|\$)/{flag=1; next} /^## [0-9]/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "FAIL: no changelog section found for v$VERSION in CHANGELOG.md"
            exit 1
          fi
          echo "ok: extracted $(wc -l < /tmp/release-notes.md) lines of release notes"

      # npm is the PRIMARY artifact — publish BEFORE the (secondary) container
      # image so a slow/flaky multi-arch ARM build can never block the release.
      # (v0.20.1 hung 30+ min on the arm64 QEMU build, gating the npm publish.)
      - name: Publish to npm
        run: |
          echo "NPM_TOKEN length: ${#NPM_TOKEN}"
          npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm publish --access public --ignore-scripts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Best-effort, like the container push below: npm (the primary artifact)
      # has already published by this point, so a transient GitHub API blip on
      # the Release step must NOT abort the job and orphan the GHCR push that
      # follows. (v0.34.0: an API outage returned an HTML 503 to this step; without
      # continue-on-error it failed the job and the container step never ran.)
      - name: Create GitHub Release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: skillscript-runtime ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false

      # Container image is a SECONDARY, best-effort artifact. Multi-arch ARM
      # builds (QEMU emulation) are slow/flaky; cap the time and NEVER fail the
      # release on it — the npm package is already published above.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push container (linux/amd64 + linux/arm64)
        continue-on-error: true
        timeout-minutes: 20
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/skillscript-runtime:v${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/skillscript-runtime:latest
